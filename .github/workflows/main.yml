name: Sync Gitee to GitHub

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Mirror Gitee to GitHub (force push)
        run: |
          set -x
          git clone --mirror https://gitee.com/yun_hua_admin/ease-ui.git gitee-mirror
          cd gitee-mirror
          git remote add github https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          # 强制推送所有分支（不删除目标仓库中多余的分支）
          git push --force --all github
          git push --force --tags github